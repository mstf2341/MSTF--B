<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTF BUZZER - PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #0f172a; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 20px; margin: 0; }
        .header { color: var(--primary); font-size: 2.2rem; margin-top: 10px; font-weight: bold; }
        .buzzer { width: 180px; height: 180px; background: #ef4444; border-radius: 50%; border: 8px solid #991b1b; color: white; font-size: 1.5rem; font-weight: bold; cursor: pointer; box-shadow: 0 10px 0 #7f1d1d; transition: 0.1s; margin: 20px auto; display: block; }
        .buzzer:disabled { background: #475569; border-color: #1e293b; box-shadow: none; cursor: not-allowed; transform: translateY(5px); }
        .winner-box { font-size: 1.8rem; color: #22c55e; margin: 20px; font-weight: bold; background: #1e293b; padding: 20px; border-radius: 15px; }
        .timer { font-size: 3rem; color: #f59e0b; font-weight: bold; margin: 10px; }
        .room-info { background: #1e293b; padding: 10px; border-radius: 10px; margin-bottom: 20px; display: inline-block; }
        .hidden { display: none; }
        input { padding: 12px; border-radius: 10px; border: none; width: 80%; max-width: 300px; margin-bottom: 10px; text-align: center; font-size: 1rem; }
        .btn { padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; margin: 10px; width: 200px; }
        .btn-player { background: #22c55e; color: white; }
        .btn-host { background: var(--primary); color: white; }
        .btn-reset { background: #ef4444; color: white; width: 90%; font-size: 1.2rem; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header">MSTF BUZZER PRO</div>

    <div id="roleSelection">
        <p>اختر دورك في اللعبة:</p>
        <button class="btn btn-player" onclick="showPlayerJoin()">أنا لاعب (Player)</button><br>
        <button class="btn btn-host" onclick="startHost()">أنا المسؤول (Host)</button>
    </div>

    <div id="playerJoin" class="hidden">
        <input type="text" id="roomCodeInput" placeholder="أدخل كود الغرفة">
        <input type="text" id="pName" placeholder="ادخل اسمك">
        <br>
        <button class="btn btn-player" onclick="startPlayer()">دخول الغرفة</button>
    </div>

    <div id="playerUI" class="hidden">
        <div class="room-info">غرفة: <span id="displayRoomCodePlayer"></span></div>
        <div id="timerDisplayPlayer" class="timer"></div>
        <button id="mainBuzzer" class="buzzer" onclick="press()">اضغط!</button>
        <div id="playerStatus">استعد..</div>
    </div>

    <div id="hostUI" class="hidden">
        <div class="room-info">كود الغرفة للمشاركة: <strong id="displayRoomCodeHost" style="color:#f59e0b; font-size: 1.5rem;"></strong></div>
        <div id="timerDisplayHost" class="timer"></div>
        <div class="winner-box">
            <p style="font-size: 0.9rem; color: #94a3b8;">أسرع لاعب:</p>
            <div id="hostWinner">في انتظار الضغط..</div>
        </div>
        <button class="btn btn-reset" onclick="reset()">تصفير (جولة جديدة)</button>
    </div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAEmoZ9PzSfTJzWbPn_yRxDnKxHR-z4Y4A",
      authDomain: "mstf-b.firebaseapp.com",
      databaseURL: "https://mstf-b-default-rtdb.firebaseio.com/",
      projectId: "mstf-b",
      storageBucket: "mstf-b.firebasestorage.app",
      messagingSenderId: "837143491416",
      appId: "1:837143491416:web:66ccc638657d9bcfcc6b2d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentRoom = "";

    // أصوات
    const clickSound = new Audio('https://www.soundjay.com/buttons/sounds/button-09.mp3');
    const finishSound = new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3');

    function showPlayerJoin() {
        document.getElementById('roleSelection').classList.add('hidden');
        document.getElementById('playerJoin').classList.remove('hidden');
    }

    function startHost() {
        const pass = prompt("رمز المسؤول:");
        if(pass === "123") {
            currentRoom = Math.floor(1000 + Math.random() * 9000).toString(); // كود من 4 أرقام
            document.getElementById('displayRoomCodeHost').innerText = currentRoom;
            document.getElementById('roleSelection').classList.add('hidden');
            document.getElementById('hostUI').classList.remove('hidden');
            listenToRoom();
        } else { alert("خطأ!"); }
    }

    function startPlayer() {
        currentRoom = document.getElementById('roomCodeInput').value;
        const name = document.getElementById('pName').value;
        if(!currentRoom || !name) return alert("أكمل البيانات!");
        
        document.getElementById('displayRoomCodePlayer').innerText = currentRoom;
        document.getElementById('playerJoin').classList.add('hidden');
        document.getElementById('playerUI').classList.remove('hidden');
        listenToRoom();
    }

    function press() {
        const name = document.getElementById('pName').value;
        const btn = document.getElementById('mainBuzzer');
        
        db.ref('rooms/' + currentRoom + '/winner').transaction(current => {
            if (current === null) {
                clickSound.play();
                return { name: name, time: Date.now() };
            }
            return; // تم الضغط مسبقاً
        });
    }

    function reset() {
        db.ref('rooms/' + currentRoom).set(null);
    }

    function listenToRoom() {
        db.ref('rooms/' + currentRoom + '/winner').on('value', (s) => {
            const data = s.val();
            const winBox = document.getElementById('hostWinner');
            const pStatus = document.getElementById('playerStatus');
            const btn = document.getElementById('mainBuzzer');
            const timerHost = document.getElementById('timerDisplayHost');
            const timerPlayer = document.getElementById('timerDisplayPlayer');

            if(data) {
                if(btn) btn.disabled = true; // قفل الزر
                winBox.innerText = data.name;
                if(pStatus) pStatus.innerText = "انتهى الوقت لـ " + data.name;
                
                // عداد 3 ثواني
                let count = 3;
                const interval = setInterval(() => {
                    if (timerHost) timerHost.innerText = count;
                    if (timerPlayer) timerPlayer.innerText = count;
                    count--;
                    if (count < 0) {
                        clearInterval(interval);
                        finishSound.play();
                        if (timerHost) timerHost.innerText = "GO!";
                        if (timerPlayer) timerPlayer.innerText = "GO!";
                    }
                }, 1000);

            } else {
                if(btn) btn.disabled = false;
                winBox.innerText = "في انتظار اللاعبين";
                if(pStatus) pStatus.innerText = "البازر جاهز!";
                if(timerHost) timerHost.innerText = "";
                if(timerPlayer) timerPlayer.innerText = "";
            }
        });
    }
</script>
</body>
</html>
