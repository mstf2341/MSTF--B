<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTF BUZZER - PRO EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #0f172a; --text: #f8fafc; --accent: #f59e0b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 20px; margin: 0; overflow-x: hidden; }
        .header { color: var(--primary); font-size: 2.5rem; margin-top: 10px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        
        .room-info { background: #1e293b; padding: 15px; border-radius: 12px; margin: 20px auto; display: inline-block; border: 1px solid #334155; }
        .room-info strong { color: var(--accent); font-size: 1.4rem; }

        .buzzer { width: 220px; height: 220px; background: radial-gradient(#ef4444, #991b1b); border-radius: 50%; border: 10px solid #7f1d1d; color: white; font-size: 1.8rem; font-weight: bold; cursor: pointer; box-shadow: 0 12px 0 #450a0a, 0 20px 30px rgba(0,0,0,0.5); transition: 0.1s; margin: 30px auto; display: block; position: relative; -webkit-tap-highlight-color: transparent; }
        .buzzer:active:not(:disabled) { transform: translateY(8px); box-shadow: 0 4px 0 #450a0a; }
        .buzzer:disabled { background: #475569; border-color: #1e293b; box-shadow: none; cursor: not-allowed; opacity: 0.6; transform: translateY(8px); }

        .winner-box { font-size: 2rem; color: #22c55e; margin: 20px auto; font-weight: bold; background: #1e293b; padding: 25px; border-radius: 20px; border: 2px dashed #22c55e; max-width: 400px; }
        .timer { font-size: 4.5rem; color: var(--accent); font-weight: bold; margin: 15px; text-shadow: 0 0 20px rgba(245, 158, 11, 0.5); font-family: monospace; }
        
        .hidden { display: none; }
        input { padding: 15px; border-radius: 12px; border: 2px solid #334155; width: 85%; max-width: 320px; margin-bottom: 15px; text-align: center; font-size: 1.1rem; background: #1e293b; color: white; }
        .btn { padding: 15px 30px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; margin: 10px; width: 220px; font-size: 1rem; transition: 0.3s; }
        .btn-player { background: #22c55e; color: white; box-shadow: 0 4px 0 #14532d; }
        .btn-host { background: var(--primary); color: white; box-shadow: 0 4px 0 #1e3a8a; }
        .btn-reset { background: #ef4444; color: white; width: 90%; font-size: 1.4rem; box-shadow: 0 5px 0 #7f1d1d; margin-top: 30px; }
        .btn:active { transform: translateY(3px); box-shadow: none; }
    </style>
</head>
<body>

    <div class="header">MSTF BUZZER</div>

    <div id="roleSelection">
        <p style="font-size: 1.2rem; margin-bottom: 30px;">مرحباً بك! اختر كيف تريد اللعب:</p>
        <button class="btn btn-player" onclick="showPlayerJoin()">أنا لاعب (Player)</button><br>
        <button class="btn btn-host" onclick="startHost()">أنا المسؤول (Host)</button>
    </div>

    <div id="playerJoin" class="hidden">
        <h3>انضمام للعبة</h3>
        <input type="number" id="roomCodeInput" placeholder="أدخل كود الغرفة (4 أرقام)">
        <input type="text" id="pName" placeholder="ادخل اسمك">
        <br>
        <button class="btn btn-player" onclick="startPlayer()">دخول</button>
    </div>

    <div id="playerUI" class="hidden">
        <div class="room-info">كود الغرفة: <span id="displayRoomCodePlayer"></span></div>
        <div id="timerDisplayPlayer" class="timer"></div>
        <button id="mainBuzzer" class="buzzer" onclick="press()">اضغط الآن!</button>
        <div id="playerStatus" style="font-size: 1.2rem;">استعد..</div>
    </div>

    <div id="hostUI" class="hidden">
        <div class="room-info">شارك الكود مع اللاعبين: <strong id="displayRoomCodeHost"></strong></div>
        <div id="timerDisplayHost" class="timer"></div>
        <div class="winner-box">
            <p style="font-size: 1rem; color: #94a3b8; margin: 0;">أسرع لاعب:</p>
            <div id="hostWinner">في انتظار الضغط..</div>
        </div>
        <button class="btn btn-reset" onclick="reset()">جولة جديدة (Reset)</button>
    </div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyAEmoZ9PzSfTJzWbPn_yRxDnKxHR-z4Y4A",
      authDomain: "mstf-b.firebaseapp.com",
      databaseURL: "https://mstf-b-default-rtdb.firebaseio.com/",
      projectId: "mstf-b",
      storageBucket: "mstf-b.firebasestorage.app",
      messagingSenderId: "837143491416",
      appId: "1:837143491416:web:66ccc638657d9bcfcc6b2d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentRoom = "";

    // تعريف الأصوات
    const clickSound = new Audio('https://www.myinstants.com/media/sounds/buzzer_yvS7S79.mp3');
    const finishSound = new Audio('https://www.myinstants.com/media/sounds/boxing-bell.mp3');

    function showPlayerJoin() {
        document.getElementById('roleSelection').classList.add('hidden');
        document.getElementById('playerJoin').classList.remove('hidden');
    }

    function startHost() {
        const pass = prompt("رمز المسؤول:");
        if(pass === "123") {
            currentRoom = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('displayRoomCodeHost').innerText = currentRoom;
            document.getElementById('roleSelection').classList.add('hidden');
            document.getElementById('hostUI').classList.remove('hidden');
            listenToRoom();
        } else { alert("رمز الدخول خاطئ!"); }
    }

    function startPlayer() {
        currentRoom = document.getElementById('roomCodeInput').value;
        const name = document.getElementById('pName').value;
        if(!currentRoom || !name) return alert("يرجى إدخال الكود واسمك!");
        
        document.getElementById('displayRoomCodePlayer').innerText = currentRoom;
        document.getElementById('playerJoin').classList.add('hidden');
        document.getElementById('playerUI').classList.remove('hidden');
        listenToRoom();
    }

    function press() {
        const name = document.getElementById('pName').value;
        db.ref('rooms/' + currentRoom + '/winner').transaction(current => {
            if (current === null) {
                return { name: name, time: Date.now() };
            }
            return; 
        });
    }

    function reset() {
        db.ref('rooms/' + currentRoom).set(null);
    }

    function listenToRoom() {
        db.ref('rooms/' + currentRoom + '/winner').on('value', (s) => {
            const data = s.val();
            const winBox = document.getElementById('hostWinner');
            const pStatus = document.getElementById('playerStatus');
            const btn = document.getElementById('mainBuzzer');
            const timerHost = document.getElementById('timerDisplayHost');
            const timerPlayer = document.getElementById('timerDisplayPlayer');

            if(data) {
                // تشغيل صوت الضغط فوراً
                clickSound.play().catch(e => console.log("Sound error:", e));
                
                if(btn) btn.disabled = true;
                winBox.innerText = data.name;
                if(pStatus) pStatus.innerText = "ضغط أولاً: " + data.name;
                
                // عداد 3 ثواني
                let count = 3;
                if (timerHost) timerHost.innerText = count;
                if (timerPlayer) timerPlayer.innerText = count;

                let interval = setInterval(() => {
                    count--;
                    if (count >= 0) {
                        if (timerHost) timerHost.innerText = count;
                        if (timerPlayer) timerPlayer.innerText = count;
                    }

                    if (count === 0) {
                        clearInterval(interval);
                        finishSound.play().catch(e => console.log("Sound error:", e));
                        if (timerHost) timerHost.innerText = "GO!";
                        if (timerPlayer) timerPlayer.innerText = "GO!";
                    }
                }, 1000);

            } else {
                // وضع التصفير
                if(btn) btn.disabled = false;
                winBox.innerText = "في انتظار الضغط..";
                if(pStatus) pStatus.innerText = "البازر جاهز!";
                if(timerHost) timerHost.innerText = "";
                if(timerPlayer) timerPlayer.innerText = "";
                finishSound.pause();
                finishSound.currentTime = 0;
            }
        });
    }
</script>
</body>
</html>
